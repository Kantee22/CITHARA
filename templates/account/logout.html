{% extends "base.html" %}

{% block title %}Sign out · CITHARA{% endblock %}

{% block content %}
<section class="max-w-md mx-auto px-6 py-20">
    <div class="card bg-slate-900/70 border border-slate-800 rounded-2xl p-8 text-center">
        <h1 class="text-2xl font-bold mb-2">Sign out?</h1>
        <p class="text-slate-400 mb-6">You can come back any time — your library will still be here.</p>
        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit"
                    class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500
                           font-semibold py-3 rounded-xl transition shadow-lg shadow-cyan-500/20">
                Yes, sign me out
            </button>
        </form>
        <a href="{% url 'create_song' %}" class="block mt-4 text-sm text-slate-400 hover:text-cyan-300">
            ← Stay signed in
        </a>
    </div>
</section>
{% endblock %}
